# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: RESTEasy Vert.x Integration Tests

on:
  push:
    branches:
      - 'main'
    paths:
      - '.github/workflows/resteasy-build.yml'
      - '**/pom.xml'
      - 'client/**'
      - 'embedded-server/**'
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/resteasy-build.yml'
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC

# Only run the latest job and cancel previous ones
concurrency:
  group: 'resteasy-${{ github.ref || github.run_id }}'
  cancel-in-progress: true

env:
  MVN_CMD: './mvnw -V -B -fae'

jobs:
  resteasy-build:
    uses: resteasy/resteasy/.github/workflows/shared-resteasy-build.yml@6.2
    with:
      resteasy-branch: "6.2"
      resteasy-repo: "resteasy/resteasy"

  resteasy-vertx-build:
    runs-on: ${{ matrix.os }}
    needs: resteasy-build
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout RESTEasy Vert.x
        uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: resteasy-maven-repository
          path: .
      - name: Extract Maven Repo
        shell: bash
        run: tar -xzf resteasy-maven-repository.tar.gz -C ~
      - name: Set up JDKs
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          cache: 'maven'
          java-version: |
            11
            17
            21
            25
            26
      - name: Build and Test RESTEasy Vert.x ${{ matrix.os }}
        run: |
          ${{ env.MVN_CMD }} clean install '-Dversion.org.jboss.resteasy=${{ needs.resteasy-build.outputs.resteasy-version }}' '-Djava11.home=${{env.JAVA_HOME_11_X64}}' '-Djava17.home=${{env.JAVA_HOME_17_X64}}' '-Djava21.home=${{env.JAVA_HOME_21_X64}}' '-Djava25.home=${{env.JAVA_HOME_25_X64}}'
      - name: Upload test logs for failed run
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: failure-reports-${{ matrix.os }}
          path: |
            **/surefire-reports/**
            **/failsafe-reports/**
            **/*.log

